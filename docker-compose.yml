version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: foundercfo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: foundercfo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: foundercfo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Backend API
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: foundercfo-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Core
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      APP_VERSION: ${APP_VERSION:-1.0.0}

      # Database
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/foundercfo

      # Authentication
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: "1d"

      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/auth/google/callback}

      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3005}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3005}

      # AI
      GEMINI_API_KEY: ${GEMINI_API_KEY}

      # Error Monitoring
      SENTRY_DSN: ${SENTRY_DSN}

    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend App
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3000}
        NEXT_PUBLIC_SENTRY_DSN: ${FRONTEND_SENTRY_DSN}
    container_name: foundercfo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3000}
      NEXT_PUBLIC_SENTRY_DSN: ${FRONTEND_SENTRY_DSN}
    ports:
      - "3005:3005"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3005" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (production only)
  nginx:
    image: nginx:alpine
    container_name: foundercfo-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    profiles:
      - production

  # Certbot for SSL certificates (production only)
  certbot:
    image: certbot/certbot
    container_name: foundercfo-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
